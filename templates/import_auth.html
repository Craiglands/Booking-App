<!DOCTYPE html>
<html>
<head>
    <title>Admin Import - Craiglands</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://files.stampede.ai/514e1892-e0be-11ec-996f-0667c77a7ebd/media/3ebabf33-84d1-4a71-ac77-88b241d399cb.jpg');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center mb-4">Admin Import</h2>
        <p class="text-center text-muted small mb-4">Enter the admin code to access the import page.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('import_auth') }}">
            <div class="mb-3">
                <label for="code" class="form-label">Admin Code</label>
                <input type="password" class="form-control" id="code" name="code" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="small">Back to main page</a>
        </div>
    </div>
</body>
</html>
